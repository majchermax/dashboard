<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f2;color:#1a1a1a;padding:1rem;max-width:480px;margin:0 auto}
.sec-label{font-size:11px;font-weight:500;color:#aaa;letter-spacing:.07em;text-transform:uppercase;margin:0 0 8px}
.card{background:#fff;border:.5px solid #e5e5e0;border-radius:12px;padding:1rem;margin-bottom:10px}
.divider{border:none;border-top:.5px solid #e5e5e0;margin:1rem 0}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-size:14px;font-weight:500}
.cal-btn{background:none;border:.5px solid #e5e5e0;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:13px;color:#888}
.cal-btn:hover{background:#f5f5f2}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px}
.cal-dow{font-size:10px;color:#aaa;text-align:center;padding:2px 0;font-weight:500}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:.5px solid transparent;color:#888;position:relative}
.cal-day:hover{background:#f5f5f2}
.cal-day.today{border-color:#ccc;color:#1a1a1a;font-weight:500}
.cal-day.selected{background:#E1F5EE;border-color:#5DCAA5;color:#085041;font-weight:500}
.cal-day.has-data::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#1D9E75}
.cal-day.selected.has-data::after{background:#085041}
.cal-day.empty{cursor:default}
.modal-overlay{background:rgba(0,0,0,.35);border-radius:12px;padding:1rem;margin-bottom:10px;display:none}
.modal-overlay.open{display:block}
.modal-card{background:#fff;border-radius:12px;padding:1rem}
.modal-title{font-size:14px;font-weight:500;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.close-btn{background:none;border:none;cursor:pointer;font-size:18px;color:#aaa;padding:0 2px}
.habit-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid #e5e5e0}
.habit-row:last-of-type{border-bottom:none}
.habit-cb{width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:#1D9E75}
.habit-name{font-size:13px;flex:1}
.habit-del{background:none;border:none;cursor:pointer;font-size:15px;color:#ccc;padding:0 2px}
.habit-del:hover{color:#E24B4A}
.add-habit-row{display:flex;gap:8px;margin-top:10px}
.add-habit-input{flex:1;border:.5px solid #e5e5e0;border-radius:8px;padding:6px 10px;font-size:13px;background:#f5f5f2;color:#1a1a1a}
.add-habit-input:focus{outline:none;border-color:#1D9E75}
.add-habit-btn{background:#1D9E75;border:none;border-radius:8px;padding:6px 12px;color:#fff;font-size:13px;cursor:pointer;font-weight:500;white-space:nowrap}
.summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.sum-card{background:#f5f5f2;border-radius:8px;padding:.875rem}
.sum-label{font-size:11px;color:#aaa;margin-bottom:4px}
.sum-val{font-size:20px;font-weight:500}
.sum-sub{font-size:11px;color:#bbb;margin-top:2px}
.hs-row{background:#fff;border:.5px solid #e5e5e0;border-radius:8px;padding:.75rem 1rem;margin-bottom:8px}
.hs-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.hs-name{font-size:13px;font-weight:500}
.hs-streak{font-size:12px;color:#0F6E56;font-weight:500}
.hs-streak.zero{color:#bbb}
.streak-bar{height:3px;background:#f0f0ee;border-radius:2px;overflow:hidden}
.streak-fill{height:100%;background:#1D9E75;border-radius:2px}
</style>
</head>
<body>

<div style="margin-bottom:1rem">
  <div style="font-size:18px;font-weight:500;margin-bottom:2px">Habit Tracker</div>
  <div style="font-size:12px;color:#aaa">Kliknij na dzień żeby zaznaczyć nawyki</div>
</div>

<div class="sec-label">Kalendarz</div>
<div class="card">
  <div class="cal-nav">
    <button class="cal-btn" onclick="changeMonth(-1)">&#8592;</button>
    <div class="cal-title" id="cal-title"></div>
    <button class="cal-btn" onclick="changeMonth(1)">&#8594;</button>
  </div>
  <div class="cal-grid">
    <div class="cal-dow">Pn</div><div class="cal-dow">Wt</div><div class="cal-dow">Śr</div>
    <div class="cal-dow">Cz</div><div class="cal-dow">Pt</div><div class="cal-dow">Sb</div><div class="cal-dow">Nd</div>
    <div id="cal-cells" style="display:contents"></div>
  </div>
</div>

<div class="modal-overlay" id="day-modal">
  <div class="modal-card">
    <div class="modal-title">
      <span id="modal-date-label"></span>
      <button class="close-btn" onclick="closeModal()">&#10005;</button>
    </div>
    <div id="modal-habits"></div>
    <div class="add-habit-row">
      <input class="add-habit-input" id="new-habit-input" placeholder="Dodaj nawyk..." onkeydown="if(event.key==='Enter')addHabit()">
      <button class="add-habit-btn" onclick="addHabit()">+ Dodaj</button>
    </div>
  </div>
</div>

<div class="divider"></div>
<div class="sec-label">Podsumowanie serii</div>

<div class="summary-grid">
  <div class="sum-card">
    <div class="sum-label">Najdłuższa seria</div>
    <div class="sum-val" id="best-streak">0 dni</div>
    <div class="sum-sub" id="best-streak-name">—</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">Aktywne nawyki</div>
    <div class="sum-val" id="habit-count">0</div>
    <div class="sum-sub">śledzone</div>
  </div>
</div>

<div id="habit-summary"></div>

<script>
let S={habits:[],data:{}};
try{S=JSON.parse(localStorage.getItem('ht_v1')||'{}');if(!S.habits)S.habits=[];if(!S.data)S.data={};}catch(e){}
function save(){localStorage.setItem('ht_v1',JSON.stringify(S));}
const now=new Date();
let viewYear=now.getFullYear(),viewMonth=now.getMonth(),selectedDate=null;
const MP=['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
const DP=['Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota','Niedziela'];
function dk(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function tdk(){return dk(now.getFullYear(),now.getMonth(),now.getDate());}
function renderCal(){
  document.getElementById('cal-title').textContent=MP[viewMonth]+' '+viewYear;
  const cells=document.getElementById('cal-cells');
  const first=new Date(viewYear,viewMonth,1);
  let dow=first.getDay(); dow=dow===0?6:dow-1;
  const days=new Date(viewYear,viewMonth+1,0).getDate();
  let html='';
  for(let i=0;i<dow;i++) html+='<div class="cal-day empty"></div>';
  for(let d=1;d<=days;d++){
    const k=dk(viewYear,viewMonth,d);
    let cls='cal-day';
    if(k===tdk()) cls+=' today';
    if(k===selectedDate) cls+=' selected';
    if(S.data[k]&&Object.keys(S.data[k]).length>0) cls+=' has-data';
    html+=`<div class="${cls}" onclick="selectDay('${k}')">${d}</div>`;
  }
  cells.innerHTML=html;
}
function changeMonth(dir){
  viewMonth+=dir;
  if(viewMonth>11){viewMonth=0;viewYear++;}
  if(viewMonth<0){viewMonth=11;viewYear--;}
  renderCal();
}
function selectDay(k){
  selectedDate=k;renderCal();openModal(k);
}
function openModal(k){
  const p=k.split('-');
  const y=parseInt(p[0]),m=parseInt(p[1])-1,d=parseInt(p[2]);
  const dobj=new Date(y,m,d);
  const dow=dobj.getDay();
  document.getElementById('modal-date-label').textContent=DP[dow===0?6:dow-1]+', '+d+' '+MP[m];
  document.getElementById('day-modal').classList.add('open');
  renderModalHabits(k);
}
function closeModal(){
  document.getElementById('day-modal').classList.remove('open');
  selectedDate=null;renderCal();renderSummary();
}
function renderModalHabits(k){
  if(!S.data[k])S.data[k]={};
  const el=document.getElementById('modal-habits');
  if(S.habits.length===0){el.innerHTML='<div style="font-size:13px;color:#aaa;padding:8px 0">Dodaj pierwszy nawyk poniżej.</div>';return;}
  let html='';
  S.habits.forEach((h,i)=>{
    const checked=S.data[k][h]?'checked':'';
    html+=`<div class="habit-row"><input type="checkbox" class="habit-cb" ${checked} onchange="toggleHabit('${k}','${h}',this.checked)"><span class="habit-name">${h}</span><button class="habit-del" onclick="deleteHabit(${i})">&#10005;</button></div>`;
  });
  el.innerHTML=html;
}
function toggleHabit(k,h,val){
  if(!S.data[k])S.data[k]={};
  if(val)S.data[k][h]=true;else delete S.data[k][h];
  if(Object.keys(S.data[k]).length===0)delete S.data[k];
  save();renderCal();
}
function addHabit(){
  const inp=document.getElementById('new-habit-input');
  const val=inp.value.trim();if(!val)return;
  if(!S.habits.includes(val))S.habits.push(val);
  inp.value='';save();
  if(selectedDate)renderModalHabits(selectedDate);
  renderSummary();
}
function deleteHabit(i){
  const name=S.habits[i];S.habits.splice(i,1);
  Object.keys(S.data).forEach(k=>{delete S.data[k][name];});
  save();if(selectedDate)renderModalHabits(selectedDate);renderSummary();
}
function calcStreak(h){
  let cur=0;const d=new Date(now);
  for(let b=0;b<365;b++){
    const k=dk(d.getFullYear(),d.getMonth(),d.getDate());
    if(S.data[k]&&S.data[k][h])cur++;else break;
    d.setDate(d.getDate()-1);
  }
  let longest=0,tmp=0;const d2=new Date(now);
  for(let b=0;b<365;b++){
    const k=dk(d2.getFullYear(),d2.getMonth(),d2.getDate());
    if(S.data[k]&&S.data[k][h])tmp++;else{longest=Math.max(longest,tmp);tmp=0;}
    d2.setDate(d2.getDate()-1);
  }
  longest=Math.max(longest,tmp);
  return{current:cur,longest};
}
function renderSummary(){
  let bestStreak=0,bestName='—';
  document.getElementById('habit-count').textContent=S.habits.length;
  let html='';
  S.habits.forEach(h=>{
    const{current,longest}=calcStreak(h);
    if(longest>bestStreak){bestStreak=longest;bestName=h;}
    const pct=longest>0?Math.round((current/longest)*100):0;
    html+=`<div class="hs-row"><div class="hs-top"><span class="hs-name">${h}</span><span class="hs-streak${current===0?' zero':''}">${current===0?'brak serii':current+' dni z rzędu'}</span></div><div class="streak-bar"><div class="streak-fill" style="width:${pct}%"></div></div><div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:11px;color:#aaa">aktualna seria</span><span style="font-size:11px;color:#aaa">rekord: ${longest} dni</span></div></div>`;
  });
  document.getElementById('habit-summary').innerHTML=html||'<div style="font-size:13px;color:#aaa">Dodaj nawyki klikając na dzień w kalendarzu.</div>';
  document.getElementById('best-streak').textContent=bestStreak+' dni';
  document.getElementById('best-streak-name').textContent=bestName;
}
renderCal();renderSummary();
</script>
</body>
</html>
